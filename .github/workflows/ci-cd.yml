name: CI/CD — Zorgati Voyage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint & Build Frontend
  # ─────────────────────────────────────────
  frontend-build:
    name: 🅰 Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular (production)
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/zorgati-voyage-frontend/browser
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2 — Lint Backend
  # ─────────────────────────────────────────
  backend-check:
    name: 🟢 Backend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Check syntax (node --check)
        run: |
          for f in app.js controllers/*.js models/*.js routes/*.js middleware/*.js config/db.js; do
            node --check "$f" && echo "✓ $f"
          done
        working-directory: backend

  # ─────────────────────────────────────────
  # JOB 3 — Docker Build & Push
  # Runs only on push to main (not PRs)
  # ─────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zorgati-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/zorgati-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zorgati-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/zorgati-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 4 — Deploy to Render (backend)
  # Triggers Render deploy hook on push to main
  # ─────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "⏭ RENDER_DEPLOY_HOOK not set — skipping"
            exit 0
          fi
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail
          echo "✅ Render deploy triggered"

  # ─────────────────────────────────────────
  # JOB 5 — Deploy Frontend → Vercel
  # ─────────────────────────────────────────
  deploy-frontend:
    name: 🚀 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        run: vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
