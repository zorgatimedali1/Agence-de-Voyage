version: '3.9'

services:
  # ── Backend API ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zorgati-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URI=${MONGO_URI=mongodb+srv://adminVoyage:f9SKnCDLMTkGc4Zr@cluster0.qv1tocs.mongodb.net/agence_voyage?retryWrites=true&w=majority&appName=Cluster0}
      - JWT_SECRET=${zorgati_voyage_super_secret_key_2026}
      - JWT_EXPIRES_IN=${8h}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - zorgati-network

  # ── Frontend (Nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zorgati-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - zorgati-network

# ── Volumes ──────────────────────────────────
volumes:
  uploads_data:
    driver: local

# ── Networks ─────────────────────────────────
networks:
  zorgati-network:
    driver: bridge
